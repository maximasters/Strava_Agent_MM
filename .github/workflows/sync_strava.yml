name: Sync Strava Data Daily

on:
  schedule:
    - cron: '0 3 * * *' # Runs daily at 3:00 AM UTC
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit data changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create data directory
        run: mkdir -p data

      # 1. Dynamically build the gitignored credentials file before the script runs
      - name: Create credentials file from GitHub Secrets/Vars
        run: |
          echo '{
            "clientId": "${{ secrets.STRAVA_CLIENT_ID }}",
            "clientSecret": "${{ secrets.STRAVA_CLIENT_SECRET }}",
            "refreshToken": "${{ vars.STRAVA_REFRESH_TOKEN }}",
            "accessToken": "",
            "expiresAt": 0
          }' > data/credentials.json

      - name: Run Strava synchronization
        run: npm run sync

      # 2. Extract the brand-new refresh token and save it back to GitHub variables for next time
      - name: Update Strava Refresh Token Variable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_REFRESH_TOKEN=$(node -e "console.log(require('./data/credentials.json').refreshToken)")
          
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables/STRAVA_REFRESH_TOKEN \
            -d "{\"name\":\"STRAVA_REFRESH_TOKEN\",\"value\":\"$NEW_REFRESH_TOKEN\"}"

      # 3. Commit only the activities data (keeping credentials safely gitignored)
      - name: Commit and push updated activities data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -f data/activities.json ]; then
            git add data/activities.json
            if ! git diff-index --quiet HEAD; then
              git commit -m "chore: auto-sync Strava activities data [skip ci]"
              git push origin main
            else
              echo "No new activities found."
            fi
          else
            echo "activities.json not found, skipping commit."
          fi