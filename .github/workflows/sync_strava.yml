name: Sync Strava Data Daily

on:
  schedule:
    - cron: '0 3 * * *' # Runs daily at 3:00 AM UTC
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22' # Using Node 22 LTS

      - name: Install dependencies
        run: npm install

      # REMOVED: "Create credentials file from GitHub Secrets"
      # This step was wiping out your newly refreshed tokens on every run.

      - name: Run Strava synchronization
        run: npm run sync

      - name: Commit and push updated data and tokens
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage BOTH the new activities AND the updated credentials file
          git add data/activities.json data/credentials.json
          
          # Only commit and push if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-sync Strava activities and refresh tokens [skip ci]"
            git push origin main
          else
            echo "No changes found. Skipping commit."
          fi